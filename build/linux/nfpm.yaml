name: "go-romm-sync"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "default"
priority: "extra"
maintainer: "Zapturk <scottmckeefer@gmail.com>"
description: "A seamless bridge between RomM and RetroArch for a console-like gaming experience."
vendor: "Zapturk"
homepage: "https://github.com/zapturk/Go-RomM-Sync"
license: "GPL-3.0-or-later"

contents:
  - src: "go-romm-sync"
    dst: "/usr/bin/go-romm-sync"
  - src: "app.desktop"
    dst: "/usr/share/applications/go-romm-sync.desktop"
  - src: "../appicon.png"
    dst: "/usr/share/icons/hicolor/256x256/apps/go-romm-sync.png"

overrides:
  deb:
    depends:
      - libgtk-3-0
      - libwebkit2gtk-4.0-37 | libwebkit2gtk-4.1-0
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1
